<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Chủ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b1a30;
            min-height: 100vh;
        }

        .header-container {
            background-color: #f7ebd3;
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between; /* Đẩy nội dung ra 2 bên */
            border-bottom: 3px solid #d4b285;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
        }

        .left-content {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        /* Khung tròn chứa ảnh Capybara */
        .logo-box {
            width: 85px;
            height: 85px;
            border-radius: 50%;
            border: 3px solid #8e6543;
            background-color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0; /* Giữ nguyên hình tròn không bị bóp méo */
        }

        /* Định dạng cho hình SVG */
        .logo-box svg {
            width: 70%;
            height: 70%;
        }

        .title-group {
            display: flex;
            flex-direction: column;
        }

        .title-group h1 {
            color: #2c1d11;
            font-size: 2.3rem;
            font-weight: 700;
        }

        .title-group h1 span {
            color: #7f4f24;
        }

        .title-group p {
            color: #5c4d3c;
            font-style: italic;
            font-size: 1rem;
            margin-top: 5px;
        }

        /* Khung màu xanh bên phải */
        .announcement-box {
            background-color: #a2c6e4;
            color: #1a2b3c;
            padding: 18px 30px;
            border-radius: 35px;
            border: 1px solid #8cb1cf;
            max-width: 450px;
            font-size: 1.05rem;
            line-height: 1.4;
            box-shadow: inset 0 2px 5px rgba(255,255,255,0.4);
            flex-shrink: 0; /* Không cho khung này bị bóp nhỏ dồn chữ */
        }
    </style>
</head>
<body>

    <header class="header-container">
        <div class="left-content">
            <div class="logo-box">
                <svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
                    <path d="M434.7 197.6c-11-20.9-34-31.5-63.5-29.3-5.7-18.4-18.7-33.3-36.4-41.2-14.7-6.5-31.2-7.4-47-3.7C275.6 103 252.7 91 226.7 91c-29.6 0-54.3 15.6-64.4 37.3-17.7 2.1-33.9 11.2-44.5 25.1-13.6 17.8-17.3 41.3-10.4 62.7-18.8 14-30 35.5-30.4 58.7-.5 26.6 13.1 50.8 34.9 64.1 1.7 18.5 9.7 35.4 22.8 47.9 14.8 14.1 34.6 21.6 55.4 21.1 15 15.6 35.6 24.2 57.7 24.2h120c15 0 29.5-4 42-11.5 17.9-10.7 30.5-28.5 35.1-49.1 17.4-7.5 31.1-21.4 38.3-39 9.3-22.7 7.7-47.9-4.5-69.5 12.3-18.4 15.4-41.5 8.7-64.5zm-225-50.6c11.9 0 22.1 7.2 26.4 17.4-9.3 5-16.7 12.9-21.1 22.4-1.8-.4-3.5-.8-5.3-.8-11.9 0-21.6 9.7-21.6 21.6s9.7 21.6 21.6 21.6c4.5 0 8.7-1.4 12.2-3.8 6.5 11.5 17.6 19.8 30.7 22.8-5.6 15.7-18.2 27.5-34.4 30.9-2.8.6-5.7.9-8.5.9-18.3 0-34.5-12.2-39.3-29.9-1.2-4.5-4.4-8.1-8.7-9.7-14.7-5.5-24.5-19.6-24.5-35.3 0-21.2 17.2-38.4 38.4-38.4 1.4 0 2.9.1 4.3.3 6.1-11.9 18.4-20.1 32.8-20.1z" fill="#8e6543"/>
                    <circle cx="340" cy="220" r="16" fill="#2c1d11"/>
                </svg>
            </div>
            
            <div class="title-group">
                <h1>Trang Web <span>Bài Tập HTML</span></h1>
                <p>Đừng lo lắng về ngày mai, vì ngày mai bạn vẫn phải học.</p>
            </div>
        </div>

        <div class="announcement-box">
           (học nữa học mãi đi nhìn gì)
        </div>
    </header>

</body>
</html>
