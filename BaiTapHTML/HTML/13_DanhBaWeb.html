<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh Bạ Website</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            padding: 30px;
            max-width: 800px;
            margin: 0 auto;
            color: #000000;
            line-height: 1.6;
        }

        /* Tiêu đề chính màu xanh dương, in hoa, căn giữa */
        .main-title {
            text-align: center;
            color: #0000FF;
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        /* Các khối danh mục (Tin tức, Giải trí, Quảng cáo) */
        .category-section {
            margin-bottom: 25px;
        }

        .category-title {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 8px;
        }

        /* Danh sách liên kết thụt lề vào trong */
        .link-list {
            list-style: none;
            padding-left: 40px;
        }

        .link-list li {
            margin-bottom: 5px;
        }

        .link-list a {
            color: #000000;
            text-decoration: underline;
        }

        /* Khu vực hình ảnh liên kết quảng cáo */
        .ads-container {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }

        .ads-box {
            width: 200px;
            height: 200px;
            border: 2px solid #000000;
            overflow: hidden;
        }

        .ads-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Đường kẻ ngang phân cách chân trang */
        hr {
            border: none;
            border-top: 1px solid #ccc;
            margin: 30px 0 15px 0;
        }

        .footer {
            font-size: 1rem;
        }

        .footer a {
            color: #000000;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <!-- Tiêu đề trang -->
    <h1 class="main-title">Danh Bạ Website</h1>

    <!-- Mục 1: Tin Tức -->
    <div class="category-section">
        <h2 class="category-title">Tin Tức</h2>
        <ul class="link-list">
            <li><a href="#">Tin tức việt nam</a></li>
            <li><a href="#">Báo tuổi trẻ</a></li>
        </ul>
    </div>

    <!-- Mục 2: Giải trí -->
    <div class="category-section">
        <h2 class="category-title">Giải trí</h2>
        <ul class="link-list">
            <li><a href="#">Nhạc số Online</a></li>
            <li><a href="#">Giới thiệu ngôi sao</a></li>
        </ul>
    </div>

    <!-- Mục 3: Liên kết quảng cáo -->
    <div class="category-section">
        <h2 class="category-title">Liên kết quảng cáo</h2>
        <div class="ads-container">
            <!-- Ảnh quảng cáo 1 -->
            <div class="ads-box">
                <a href="#"><img src="https://images.unsplash.com/photo-1514525253161-7a46d19cd819?w=200&q=80" alt="Quảng cáo 1"></a>
            </div>
            <!-- Ảnh quảng cáo 2 -->
            <div class="ads-box">
                <a href="#"><img src="https://images.unsplash.com/photo-1498038432885-c6f3f1b912ee?w=200&q=80" alt="Quảng cáo 2"></a>
            </div>
        </div>
    </div>

    <hr>

    <!-- Chân trang liên hệ -->
    <div class="footer">
        Liên hệ: <a href="mailto:example@gmail.com">Gửi mail</a>
    </div>

</body>
</html>
