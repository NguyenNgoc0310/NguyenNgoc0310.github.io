<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nhạc Online - Sơn Tùng M-TP</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            padding: 40px;
            background-color: #ffffff;
            color: #000000;
            line-height: 2;
        }

        /* Tiêu đề màu đỏ đậm chuẩn cấu trúc */
        .page-title {
            color: #800000;
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 25px;
        }

        /* Khung danh sách các liên kết bài hát */
        .music-links {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding-left: 5px;
        }

        /* Các đường link màu tím và có gạch chân */
        .music-links a {
            color: #800080;
            font-size: 1.15rem;
            text-decoration: underline;
            margin-bottom: 8px;
        }

        /* Đổi màu khi di chuột qua */
        .music-links a:hover {
            color: #ff0000;
        }
    </style>
</head>
<body>

    <!-- Tiêu đề chính -->
    <h1 class="page-title">Nhạc Online</h1>

    <!-- Danh sách liên kết toàn bộ là nhạc của Sơn Tùng M-TP -->
    <div class="music-links">
        <a href="#">Đừng Làm Trái Tim Anh Đau</a>
        <a href="#">Chúng Ta Của Tương Lai</a>
        <a href="#">Making My Way</a>
        <a href="#">There's No One At All</a>
        <a href="#">Muộn Rồi Mà Sao Còn</a>
        <a href="#">Chúng Ta Của Hiện Tại</a>
    </div>

</body>
</html>
